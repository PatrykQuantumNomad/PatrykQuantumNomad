<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- Dark radial background gradient -->
    <radialGradient id="bg-glow" cx="50%" cy="45%" r="65%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0f0f23"/>
    </radialGradient>

    <!-- Amber accent gradient -->
    <linearGradient id="amber-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#D97706"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>

    <!-- Amber glow filter for title -->
    <filter id="amber-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle noise texture -->
    <filter id="noise" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="gray-noise"/>
      <feBlend in="SourceGraphic" in2="gray-noise" mode="overlay" result="blended"/>
      <feComponentTransfer in="blended">
        <feFuncA type="linear" slope="1"/>
      </feComponentTransfer>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg-glow)"/>

  <!-- Subtle noise overlay -->
  <rect width="1200" height="630" fill="url(#bg-glow)" filter="url(#noise)" opacity="0.04"/>

  <!-- Decorative corner accents (30px inset) -->
  <!-- Top-left -->
  <line x1="30" y1="30" x2="80" y2="30" stroke="#D97706" stroke-opacity="0.3" stroke-width="1"/>
  <line x1="30" y1="30" x2="30" y2="80" stroke="#D97706" stroke-opacity="0.3" stroke-width="1"/>
  <!-- Top-right -->
  <line x1="1170" y1="30" x2="1120" y2="30" stroke="#D97706" stroke-opacity="0.3" stroke-width="1"/>
  <line x1="1170" y1="30" x2="1170" y2="80" stroke="#D97706" stroke-opacity="0.3" stroke-width="1"/>
  <!-- Bottom-left -->
  <line x1="30" y1="600" x2="80" y2="600" stroke="#D97706" stroke-opacity="0.3" stroke-width="1"/>
  <line x1="30" y1="600" x2="30" y2="550" stroke="#D97706" stroke-opacity="0.3" stroke-width="1"/>
  <!-- Bottom-right -->
  <line x1="1170" y1="600" x2="1120" y2="600" stroke="#D97706" stroke-opacity="0.3" stroke-width="1"/>
  <line x1="1170" y1="600" x2="1170" y2="550" stroke="#D97706" stroke-opacity="0.3" stroke-width="1"/>

  <!-- =======================================
       DECORATIVE CODE FRAGMENTS
       Fading monospace text at very low opacity
       ======================================= -->

  <!-- Upper-left region -->
  <text x="85" y="75" font-family="'SF Mono','Fira Code','Cascadia Code','JetBrains Mono',monospace" font-size="11" fill="white" fill-opacity="0.05" transform="rotate(-2, 85, 75)">function()</text>
  <text x="160" y="130" font-family="'SF Mono','Fira Code','Cascadia Code','JetBrains Mono',monospace" font-size="10" fill="white" fill-opacity="0.04">return null;</text>
  <text x="70" y="200" font-family="'SF Mono','Fira Code','Cascadia Code','JetBrains Mono',monospace" font-size="12" fill="white" fill-opacity="0.07" transform="rotate(1, 70, 200)">// TODO: understand this</text>
  <text x="200" y="260" font-family="'SF Mono','Fira Code','Cascadia Code','JetBrains Mono',monospace" font-size="10" fill="white" fill-opacity="0.03">catch (e) {</text>
  <text x="50" y="340" font-family="'SF Mono','Fira Code','Cascadia Code','JetBrains Mono',monospace" font-size="11" fill="white" fill-opacity="0.06" transform="rotate(-1, 50, 340)">deprecated</text>

  <!-- Upper-right region -->
  <text x="950" y="90" font-family="'SF Mono','Fira Code','Cascadia Code','JetBrains Mono',monospace" font-size="10" fill="white" fill-opacity="0.04" transform="rotate(3, 950, 90)">if (unknown) {</text>
  <text x="1020" y="155" font-family="'SF Mono','Fira Code','Cascadia Code','JetBrains Mono',monospace" font-size="11" fill="white" fill-opacity="0.06">void</text>
  <text x="880" y="210" font-family="'SF Mono','Fira Code','Cascadia Code','JetBrains Mono',monospace" font-size="10" fill="white" fill-opacity="0.03" transform="rotate(-2, 880, 210)">/* no one remembers */</text>
  <text x="1050" y="270" font-family="'SF Mono','Fira Code','Cascadia Code','JetBrains Mono',monospace" font-size="12" fill="white" fill-opacity="0.05">throw;</text>
  <text x="920" y="330" font-family="'SF Mono','Fira Code','Cascadia Code','JetBrains Mono',monospace" font-size="10" fill="white" fill-opacity="0.04" transform="rotate(1, 920, 330)">undefined</text>

  <!-- Lower-left region -->
  <text x="120" y="410" font-family="'SF Mono','Fira Code','Cascadia Code','JetBrains Mono',monospace" font-size="11" fill="white" fill-opacity="0.05" transform="rotate(2, 120, 410)">legacy_handler()</text>
  <text x="60" y="470" font-family="'SF Mono','Fira Code','Cascadia Code','JetBrains Mono',monospace" font-size="10" fill="white" fill-opacity="0.03">// FIXME</text>
  <text x="190" y="520" font-family="'SF Mono','Fira Code','Cascadia Code','JetBrains Mono',monospace" font-size="12" fill="white" fill-opacity="0.06" transform="rotate(-3, 190, 520)">break;</text>
  <text x="100" y="560" font-family="'SF Mono','Fira Code','Cascadia Code','JetBrains Mono',monospace" font-size="10" fill="white" fill-opacity="0.04">&lt;/unknown&gt;</text>

  <!-- Lower-right region -->
  <text x="980" y="400" font-family="'SF Mono','Fira Code','Cascadia Code','JetBrains Mono',monospace" font-size="10" fill="white" fill-opacity="0.04" transform="rotate(-1, 980, 400)">process.exit(1)</text>
  <text x="1060" y="460" font-family="'SF Mono','Fira Code','Cascadia Code','JetBrains Mono',monospace" font-size="11" fill="white" fill-opacity="0.05">null</text>
  <text x="900" y="510" font-family="'SF Mono','Fira Code','Cascadia Code','JetBrains Mono',monospace" font-size="10" fill="white" fill-opacity="0.03" transform="rotate(2, 900, 510)">while(true) {</text>
  <text x="1000" y="560" font-family="'SF Mono','Fira Code','Cascadia Code','JetBrains Mono',monospace" font-size="12" fill="white" fill-opacity="0.06">unreachable</text>

  <!-- Center-scattered (near but not overlapping title) -->
  <text x="350" y="170" font-family="'SF Mono','Fira Code','Cascadia Code','JetBrains Mono',monospace" font-size="10" fill="white" fill-opacity="0.04" transform="rotate(-1, 350, 170)">@deprecated</text>
  <text x="750" y="150" font-family="'SF Mono','Fira Code','Cascadia Code','JetBrains Mono',monospace" font-size="11" fill="white" fill-opacity="0.05" transform="rotate(1, 750, 150)">async void</text>
  <text x="450" y="450" font-family="'SF Mono','Fira Code','Cascadia Code','JetBrains Mono',monospace" font-size="10" fill="white" fill-opacity="0.03">// who wrote this?</text>
  <text x="680" y="480" font-family="'SF Mono','Fira Code','Cascadia Code','JetBrains Mono',monospace" font-size="11" fill="white" fill-opacity="0.04" transform="rotate(-2, 680, 480)">err != nil</text>
  <text x="520" y="530" font-family="'SF Mono','Fira Code','Cascadia Code','JetBrains Mono',monospace" font-size="10" fill="white" fill-opacity="0.05" transform="rotate(1, 520, 530)">panic()</text>

  <!-- =======================================
       TITLE: "DARK CODE"
       Clear focal point with amber glow
       ======================================= -->
  <text x="600" y="300" font-family="Helvetica,Arial,sans-serif" font-size="56" fill="white" fill-opacity="0.95" text-anchor="middle" letter-spacing="14" font-weight="bold">DARK CODE</text>

  <!-- =======================================
       SUBTITLE
       ======================================= -->
  <text x="600" y="350" font-family="Georgia,'Times New Roman',serif" font-size="20" fill="#F59E0B" fill-opacity="1" text-anchor="middle" font-style="italic">The Silent Rot AI Accelerated</text>

  <!-- =======================================
       ATTRIBUTION
       ======================================= -->
  <text x="600" y="590" font-family="Helvetica,Arial,sans-serif" font-size="12" fill="white" fill-opacity="0.6" text-anchor="middle" letter-spacing="2">patrykgolabek.dev/blog/dark-code</text>
</svg>
