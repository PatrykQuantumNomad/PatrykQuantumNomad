  </g>
  <!-- Arrow from MCP to context window -->
  <line x1="980" y1="171" x2="805" y2="200" stroke="#D97706" stroke-opacity="0.4" stroke-width="1" stroke-dasharray="4,3"/>
  <polygon points="805,200 811,194 813,202" fill="#D97706" fill-opacity="0.5"/>

