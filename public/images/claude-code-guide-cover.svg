  </g>
  <!-- Arrow from Worktrees to context window -->
  <line x1="980" y1="246" x2="805" y2="260" stroke="#D97706" stroke-opacity="0.4" stroke-width="1" stroke-dasharray="4,3"/>
  <polygon points="805,260 811,254 813,262" fill="#D97706" fill-opacity="0.5"/>

  <!-- Agent Teams block -->
  <g filter="url(#soft-shadow)">
    <rect x="980" y="300" width="160" height="42" rx="6" fill="#D97706" fill-opacity="0.15" stroke="#D97706" stroke-opacity="0.6" stroke-width="1.2"/>
    <text x="1060" y="326" font-family="Helvetica,Arial,sans-serif" font-size="12" fill="#F59E0B" fill-opacity="1" text-anchor="middle" font-weight="bold">Agent Teams</text>
  </g>
  <!-- Arrow from Agent Teams to context window -->
  <line x1="980" y1="321" x2="805" y2="320" stroke="#D97706" stroke-opacity="0.4" stroke-width="1" stroke-dasharray="4,3"/>
  <polygon points="805,320 811,314 813,322" fill="#D97706" fill-opacity="0.5"/>

