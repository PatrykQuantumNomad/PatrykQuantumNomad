  <g filter="url(#soft-shadow)">
    <rect x="60" y="300" width="160" height="42" rx="6" fill="#D97706" fill-opacity="0.15" stroke="#D97706" stroke-opacity="0.6" stroke-width="1.2"/>
    <text x="140" y="326" font-family="Helvetica,Arial,sans-serif" font-size="12" fill="#F59E0B" fill-opacity="1" text-anchor="middle" font-weight="bold">Hooks</text>
  </g>
  <!-- Arrow from Hooks to context window -->
  <line x1="220" y1="321" x2="395" y2="320" stroke="#D97706" stroke-opacity="0.4" stroke-width="1" stroke-dasharray="4,3"/>
  <polygon points="395,320 387,314 389,322" fill="#D97706" fill-opacity="0.5"/>

