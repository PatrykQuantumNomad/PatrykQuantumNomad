       RIGHT SIDE INPUT BLOCKS (flowing in)
       ======================================= -->

  <!-- MCP block -->
  <g filter="url(#soft-shadow)">
    <rect x="980" y="150" width="160" height="42" rx="6" fill="#D97706" fill-opacity="0.15" stroke="#D97706" stroke-opacity="0.6" stroke-width="1.2"/>
