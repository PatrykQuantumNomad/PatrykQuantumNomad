       LABELS
       ======================================= -->

  <!-- Left label -->
  <text x="140" y="130" font-family="Helvetica,Arial,sans-serif" font-size="10" fill="white" fill-opacity="0.5" text-anchor="middle" letter-spacing="2">WHAT YOU DESIGN</text>
  <line x1="60" y1="138" x2="220" y2="138" stroke="white" stroke-opacity="0.15" stroke-width="1"/>

  <!-- Right label -->
  <text x="1060" y="130" font-family="Helvetica,Arial,sans-serif" font-size="10" fill="white" fill-opacity="0.5" text-anchor="middle" letter-spacing="2">WHAT YOU CONNECT</text>
  <line x1="980" y1="138" x2="1140" y2="138" stroke="white" stroke-opacity="0.15" stroke-width="1"/>

  <!-- =======================================
       BOTTOM: DEVELOPER annotation
       ======================================= -->

  <!-- Developer control annotation -->
  <text x="140" y="400" font-family="Georgia,'Times New Roman',serif" font-size="11" fill="white" fill-opacity="0.5" text-anchor="middle" font-style="italic">Project knowledge</text>
  <text x="140" y="416" font-family="Georgia,'Times New Roman',serif" font-size="11" fill="white" fill-opacity="0.5" text-anchor="middle" font-style="italic">Reusable capabilities</text>
  <text x="140" y="432" font-family="Georgia,'Times New Roman',serif" font-size="11" fill="white" fill-opacity="0.5" text-anchor="middle" font-style="italic">Automated guardrails</text>

  <text x="1060" y="400" font-family="Georgia,'Times New Roman',serif" font-size="11" fill="white" fill-opacity="0.5" text-anchor="middle" font-style="italic">External tools</text>
  <text x="1060" y="416" font-family="Georgia,'Times New Roman',serif" font-size="11" fill="white" fill-opacity="0.5" text-anchor="middle" font-style="italic">Parallel branches</text>
  <text x="1060" y="432" font-family="Georgia,'Times New Roman',serif" font-size="11" fill="white" fill-opacity="0.5" text-anchor="middle" font-style="italic">Multi-agent coordination</text>

  <!-- Central insight -->
  <text x="600" y="520" font-family="Georgia,'Times New Roman',serif" font-size="15" fill="#D97706" fill-opacity="0.9" text-anchor="middle" font-style="italic">"Design the context. Shape the output."</text>

  <!-- Chapter count -->
  <text x="600" y="555" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="white" fill-opacity="0.5" text-anchor="middle" letter-spacing="2">11 CHAPTERS  |  ZERO TO HERO</text>

  <!-- =======================================
       BOTTOM: Tagline + URL
       ======================================= -->

  <!-- Amber accent line -->
  <line x1="400" y1="590" x2="800" y2="590" stroke="#D97706" stroke-opacity="0.3" stroke-width="1"/>

  <!-- Attribution -->
  <text x="600" y="620" font-family="Helvetica,Arial,sans-serif" font-size="12" fill="white" fill-opacity="0.85" text-anchor="middle" letter-spacing="2">patrykgolabek.dev/guides/claude-code</text>

  <!-- Decorative corner accents -->
  <line x1="30" y1="30" x2="80" y2="30" stroke="#D97706" stroke-opacity="0.3" stroke-width="1"/>
  <line x1="30" y1="30" x2="30" y2="80" stroke="#D97706" stroke-opacity="0.3" stroke-width="1"/>
  <line x1="1170" y1="30" x2="1120" y2="30" stroke="#D97706" stroke-opacity="0.3" stroke-width="1"/>
  <line x1="1170" y1="30" x2="1170" y2="80" stroke="#D97706" stroke-opacity="0.3" stroke-width="1"/>
  <line x1="30" y1="660" x2="80" y2="660" stroke="#D97706" stroke-opacity="0.3" stroke-width="1"/>
  <line x1="30" y1="660" x2="30" y2="610" stroke="#D97706" stroke-opacity="0.3" stroke-width="1"/>
  <line x1="1170" y1="660" x2="1120" y2="660" stroke="#D97706" stroke-opacity="0.3" stroke-width="1"/>
  <line x1="1170" y1="660" x2="1170" y2="610" stroke="#D97706" stroke-opacity="0.3" stroke-width="1"/>
</svg>
